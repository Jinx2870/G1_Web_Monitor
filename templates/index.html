<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G1 深度相机监控</title>
    <style>
        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .page {
            max-width: 1320px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .title {
            margin: 0;
            font-size: 30px;
        }

        .subtitle {
            margin: 8px 0 0;
            color: #94a3b8;
        }

        .status {
            min-width: 280px;
            padding: 14px 16px;
            border-radius: 12px;
            background: #111827;
            border: 1px solid #1f2937;
        }

        .status strong {
            display: block;
            margin-bottom: 6px;
            color: #22c55e;
        }

        .status.error strong {
            color: #ef4444;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 18px;
        }

        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
        }

        .card h3 {
            margin: 0;
            padding: 16px 18px 8px;
            font-size: 20px;
        }

        .card p {
            margin: 0;
            padding: 0 18px 12px;
            color: #94a3b8;
        }

        .card img {
            display: block;
            width: 100%;
            background: #020617;
        }

        .main-card {
            grid-column: 1 / -1;
        }

        .meta {
            margin-top: 18px;
            color: #94a3b8;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div>
                <h1 class="title">G1 机器人第一视角深度相机</h1>
                <p class="subtitle">支持 RealSense 真深度，也支持用 Mac 摄像头做 RGB 和伪深度本地联调。</p>
            </div>
            <div class="status" id="status-box">
                <strong id="status-title">正在连接相机...</strong>
                <span id="status-text">等待后端状态返回。</span>
            </div>
        </div>

        <div class="grid">
            <section class="card main-card">
                <h3>深度画面</h3>
                <p>主视图显示深度结果。Webcam 模式下这里是伪深度测试图，不代表真实距离。</p>
                <img src="/stream/depth" alt="Depth stream">
            </section>

            <section class="card">
                <h3>RGB 画面</h3>
                <p>用于校验第一视角彩色图像是否同步输出。</p>
                <img src="/stream/color" alt="RGB stream">
            </section>

            <section class="card">
                <h3>拼接画面</h3>
                <p>将 RGB 与深度图横向拼接，便于调试对齐效果。</p>
                <img src="/stream/combined" alt="Combined stream">
            </section>
        </div>

        <div class="meta" id="meta-text">分辨率和运行状态将在这里刷新。</div>
    </div>

    <script>
        async function refreshStatus() {
            try {
                const response = await fetch("/api/status");
                const data = await response.json();
                const statusBox = document.getElementById("status-box");
                const statusTitle = document.getElementById("status-title");
                const statusText = document.getElementById("status-text");
                const metaText = document.getElementById("meta-text");

                if (data.last_error) {
                    statusBox.classList.add("error");
                    statusTitle.textContent = "相机状态异常";
                    statusText.textContent = data.last_error;
                } else {
                    statusBox.classList.remove("error");
                    statusTitle.textContent = data.running ? "相机流运行中" : "等待相机启动";
                    statusText.textContent = `来源: ${data.camera_source} | 深度模式: ${data.depth_mode} | 可用流: ${data.available_streams.join(", ") || "暂无"}`;
                }

                metaText.textContent = `来源 ${data.camera_source} | 分辨率 ${data.width}x${data.height} | FPS ${data.fps} | RGB ${data.enable_rgb ? "开启" : "关闭"} | Depth ${data.enable_depth ? "开启" : "关闭"} | Align ${data.align_depth ? "开启" : "关闭"} | Webcam Index ${data.webcam_index} | 已采集帧数 ${data.frame_counter}`;
            } catch (error) {
                document.getElementById("status-box").classList.add("error");
                document.getElementById("status-title").textContent = "无法连接后端";
                document.getElementById("status-text").textContent = error.message;
            }
        }

        refreshStatus();
        setInterval(refreshStatus, 2000);
    </script>
</body>
</html>
